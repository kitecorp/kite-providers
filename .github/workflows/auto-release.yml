name: Auto Release on Version Change

on:
  push:
    branches:
      - main
    paths:
      - 'aws/build.gradle'
      - 'azure/build.gradle'
      - 'files/build.gradle'
      - 'gcp/build.gradle'
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider to release'
        type: choice
        required: true
        options:
          - all
          - aws
          - azure
          - files
          - gcp

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect providers to release
        id: set-matrix
        run: |
          MANUAL_PROVIDER="${{ inputs.provider }}"
          PROVIDERS_TO_RELEASE=""

          if [ -n "$MANUAL_PROVIDER" ] && [ "$MANUAL_PROVIDER" != "all" ]; then
            PROVIDERS="$MANUAL_PROVIDER"
          else
            PROVIDERS="aws azure files gcp"
          fi

          for PROVIDER in $PROVIDERS; do
            BUILD_FILE="$PROVIDER/build.gradle"

            if [ ! -f "$BUILD_FILE" ]; then
              continue
            fi

            VERSION=$(grep "^version = " "$BUILD_FILE" | sed "s/version = ['\"]//;s/['\"]//")
            if [ -z "$VERSION" ]; then
              continue
            fi

            TAG="$PROVIDER-v$VERSION"

            # For push events, check if release already exists for this version
            if [ -z "$MANUAL_PROVIDER" ]; then
              # Check if tag already has a release (not just a tag)
              if gh release view "$TAG" &>/dev/null; then
                echo "Release $TAG already exists, skipping $PROVIDER"
                continue
              fi
            fi

            if [ -n "$PROVIDERS_TO_RELEASE" ]; then
              PROVIDERS_TO_RELEASE="$PROVIDERS_TO_RELEASE,"
            fi
            PROVIDERS_TO_RELEASE="$PROVIDERS_TO_RELEASE{\"provider\":\"$PROVIDER\",\"version\":\"$VERSION\"}"
          done

          if [ -z "$PROVIDERS_TO_RELEASE" ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"include\":[$PROVIDERS_TO_RELEASE]}" >> $GITHUB_OUTPUT
          fi

          echo "Providers to release: $PROVIDERS_TO_RELEASE"

  release:
    needs: detect
    if: ${{ fromJson(needs.detect.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Checkout kite-api
        uses: actions/checkout@v6
        with:
          repository: kitecorp/kite-api
          path: sdk-build/kite-api

      - name: Checkout kite-proto
        uses: actions/checkout@v6
        with:
          repository: kitecorp/kite-proto
          path: sdk-build/kite-proto

      - name: Checkout kite-provider-sdk
        uses: actions/checkout@v6
        with:
          repository: kitecorp/kite-provider-sdk
          path: sdk-build/kite-provider-sdk

      - name: Create multi-project settings
        run: |
          cat > sdk-build/settings.gradle << 'EOF'
          plugins {
              id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
          }
          rootProject.name = 'kite-sdk-build'
          include 'kite-api'
          include 'kite-proto'
          include 'kite-provider-sdk'
          EOF

          cat > sdk-build/build.gradle << 'EOF'
          // Root build file - subprojects have their own build.gradle
          EOF

      - name: Setup Gradle wrapper for SDK build
        working-directory: sdk-build
        run: |
          # Generate Gradle wrapper (setup-gradle provides gradle command)
          gradle wrapper

      - name: Build and publish SDK to Maven Local
        working-directory: sdk-build
        run: ./gradlew :kite-api:publishToMavenLocal :kite-proto:publishToMavenLocal :kite-provider-sdk:publishToMavenLocal --no-daemon

      - name: Build provider
        working-directory: ${{ matrix.provider }}
        run: |
          chmod +x gradlew
          ./gradlew installDist --no-daemon

      - name: Create distribution zip
        working-directory: ${{ matrix.provider }}
        run: |
          INSTALL_DIR=$(find build/install -mindepth 1 -maxdepth 1 -type d | head -1)
          cd "$INSTALL_DIR"
          zip -r $GITHUB_WORKSPACE/${{ matrix.provider }}.zip .

      - name: Commit regenerated docs
        env:
          PROVIDER: ${{ matrix.provider }}
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$PROVIDER/docs/"
          if git diff --cached --quiet; then
            echo "No doc changes to commit for $PROVIDER"
          else
            git commit -m "docs($PROVIDER): regenerate for v$VERSION [skip ci]"
            # Move any leftover build artifacts aside so rebase has a clean tree.
            # We don't need them — the zip was produced in the previous step.
            git stash push --include-untracked --message "build-leftovers" || true
            # Retry loop: another matrix job can push between our rebase and
            # our push. Keep pulling and retrying until the push sticks.
            for attempt in 1 2 3 4 5 6 7 8; do
              git pull --rebase origin main
              if git push origin main; then
                break
              fi
              echo "Push rejected on attempt $attempt, retrying..."
              sleep $((attempt * 2))
              if [ $attempt -eq 8 ]; then
                echo "::error::Push failed after 8 attempts"
                exit 1
              fi
            done
            # Drop the stash (build artifacts are disposable)
            git stash drop 2>/dev/null || true
          fi

      - name: Create tag and release
        run: |
          TAG="${{ matrix.provider }}-v${{ matrix.version }}"

          # Delete existing tag if present
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create tag on current HEAD (which now includes the docs commit)
          git tag -f "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ matrix.provider }} v${{ matrix.version }}
          tag_name: ${{ matrix.provider }}-v${{ matrix.version }}
          files: ${{ matrix.provider }}.zip
          generate_release_notes: true
          draft: false

  update-index:
    name: Regenerate providers.json index
    needs: release
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Regenerate docs/providers.json
        run: |
          set -euo pipefail
          # Scan every directory that has a docs/versions.json — that's the
          # source of truth for which providers have published docs.
          ENTRIES=""
          for DIR in */; do
            PROVIDER="${DIR%/}"
            VERSIONS="$PROVIDER/docs/versions.json"
            [ -f "$VERSIONS" ] || continue

            LATEST=$(jq -r '.latest' "$VERSIONS")
            [ -n "$LATEST" ] && [ "$LATEST" != "null" ] || continue

            MANIFEST="$PROVIDER/docs/$LATEST/manifest.json"
            if [ -f "$MANIFEST" ]; then
              COUNT=$(jq '.resources | length' "$MANIFEST")
            else
              COUNT=0
            fi

            [ -n "$ENTRIES" ] && ENTRIES="$ENTRIES,"
            ENTRIES="$ENTRIES{\"name\":\"$PROVIDER\",\"latestVersion\":\"$LATEST\",\"resourceCount\":$COUNT}"
          done

          mkdir -p docs
          echo "{\"providers\":[$ENTRIES]}" | jq . > docs/providers.json
          cat docs/providers.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/providers.json
          if git diff --cached --quiet; then
            echo "providers.json unchanged"
          else
            git commit -m "docs: regenerate providers.json index [skip ci]"
            for attempt in 1 2 3 4 5 6 7 8; do
              git pull --rebase origin main
              if git push origin main; then
                break
              fi
              echo "Push rejected on attempt $attempt, retrying..."
              sleep $((attempt * 2))
              if [ $attempt -eq 8 ]; then
                echo "::error::Push failed after 8 attempts"
                exit 1
              fi
            done
          fi

# Build Provider Docs
#
# Generates HTML + Markdown documentation for each provider using the docgen
# task from kite-provider-gradle-plugin, then commits the regenerated docs/
# directory back to main. Docs are served via GitHub Pages from this repo.
#
# Scope: docs only. Binary releases are still handled by release.yml /
# auto-release.yml — this workflow does not tag or create GitHub Releases.
#
# Triggers:
#   * push to main touching any {provider}/src/** or {provider}/build.gradle
#     → auto-rebuild only the affected providers
#   * workflow_dispatch with a provider choice (or 'all') → manual rebuild
#
# Auth:
#   Uses the default GITHUB_TOKEN. Same repo, nothing cross-repo — no App,
#   no PAT, no secrets to set up. The job grants itself contents: write.

name: Build Provider Docs

on:
  push:
    branches:
      - main
    paths:
      - 'aws/src/**'
      - 'aws/build.gradle'
      - 'azure/src/**'
      - 'azure/build.gradle'
      - 'files/src/**'
      - 'files/build.gradle'
      - 'gcp/src/**'
      - 'gcp/build.gradle'
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider to rebuild docs for'
        type: choice
        required: true
        default: 'all'
        options:
          - all
          - aws
          - azure
          - files
          - gcp

concurrency:
  group: build-docs-${{ github.event.inputs.provider || 'auto' }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect providers to rebuild
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_any: ${{ steps.matrix.outputs.has_any }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Build matrix
        id: matrix
        run: |
          set -euo pipefail

          MANUAL="${{ github.event.inputs.provider }}"
          if [ -n "$MANUAL" ] && [ "$MANUAL" != "all" ]; then
            CANDIDATES="$MANUAL"
          elif [ -n "$MANUAL" ]; then
            CANDIDATES="aws azure files gcp"
          else
            # push trigger: detect which providers have changes in this push
            CANDIDATES=""
            CHANGED=$(git diff --name-only HEAD^ HEAD || true)
            for P in aws azure files gcp; do
              if echo "$CHANGED" | grep -qE "^$P/(src/|build\.gradle)"; then
                CANDIDATES="$CANDIDATES $P"
              fi
            done
          fi

          ENTRIES=""
          for P in $CANDIDATES; do
            [ -f "$P/build.gradle" ] || continue
            [ -n "$ENTRIES" ] && ENTRIES="$ENTRIES,"
            ENTRIES="$ENTRIES{\"provider\":\"$P\"}"
          done

          if [ -z "$ENTRIES" ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "has_any=false" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\":[$ENTRIES]}" >> "$GITHUB_OUTPUT"
            echo "has_any=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build docs for ${{ matrix.provider }}
    needs: detect
    if: needs.detect.outputs.has_any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1  # serialize pushes to main
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Checkout SDK sources
        run: |
          set -euo pipefail
          mkdir -p sdk-build
          for REPO in kite-api kite-proto kite-provider-sdk; do
            git clone --depth 1 "https://github.com/kitecorp/$REPO.git" "sdk-build/$REPO"
          done

      - name: Publish SDK chain to mavenLocal
        working-directory: sdk-build
        run: |
          set -euo pipefail
          cat > settings.gradle <<'EOF'
          plugins {
              id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
          }
          rootProject.name = 'kite-sdk-build'
          include 'kite-api'
          include 'kite-proto'
          include 'kite-provider-sdk'
          EOF
          echo '// root' > build.gradle
          gradle wrapper
          ./gradlew \
            :kite-api:publishToMavenLocal \
            :kite-proto:publishToMavenLocal \
            :kite-provider-sdk:publishToMavenLocal \
            --no-daemon

      - name: Build provider (runs docgen)
        working-directory: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          chmod +x gradlew 2>/dev/null || true
          ./gradlew build --no-daemon

      - name: Verify docs generated
        working-directory: ${{ matrix.provider }}
        run: |
          if [ ! -f "docs/versions.json" ]; then
            echo "::error::Missing docs/versions.json after build. Check docsEnabled in ${{ matrix.provider }}/build.gradle."
            exit 1
          fi

      - name: Commit regenerated docs
        env:
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$PROVIDER/docs/"
          if git diff --cached --quiet; then
            echo "No doc changes for $PROVIDER"
            exit 0
          fi

          VERSION=$(grep "^version = " "$PROVIDER/build.gradle" | sed "s/version = ['\"]//;s/['\"]//" | head -1)
          git commit -m "docs($PROVIDER): regenerate for v$VERSION [skip ci]"

          # Rebase in case another matrix job pushed while we were building
          git pull --rebase origin main
          git push origin main

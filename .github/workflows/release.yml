name: Release Provider

on:
  push:
    tags:
      - 'aws-*'
      - 'azure-*'
      - 'files-*'
      - 'gcp-*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history to be able to push a follow-up docs commit to main
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Extract provider and version from tag
        id: extract
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PROVIDER=$(echo $TAG | sed 's/-v.*//')
          VERSION=$(echo $TAG | sed 's/.*-//')
          echo "provider=$PROVIDER" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout kite-api
        uses: actions/checkout@v6
        with:
          repository: kitecorp/kite-api
          path: sdk-build/kite-api

      - name: Checkout kite-proto
        uses: actions/checkout@v6
        with:
          repository: kitecorp/kite-proto
          path: sdk-build/kite-proto

      - name: Checkout kite-provider-sdk
        uses: actions/checkout@v6
        with:
          repository: kitecorp/kite-provider-sdk
          path: sdk-build/kite-provider-sdk

      - name: Create multi-project settings
        run: |
          cat > sdk-build/settings.gradle << 'EOF'
          plugins {
              id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
          }
          rootProject.name = 'kite-sdk-build'
          include 'kite-api'
          include 'kite-proto'
          include 'kite-provider-sdk'
          EOF

          cat > sdk-build/build.gradle << 'EOF'
          // Root build file - subprojects have their own build.gradle
          EOF

      - name: Setup Gradle wrapper for SDK build
        working-directory: sdk-build
        run: |
          # Generate Gradle wrapper (setup-gradle provides gradle command)
          gradle wrapper

      - name: Build and publish SDK to Maven Local
        working-directory: sdk-build
        run: |
          ./gradlew :kite-api:publishToMavenLocal :kite-proto:publishToMavenLocal :kite-provider-sdk:publishToMavenLocal --no-daemon

      - name: Build provider
        working-directory: ${{ steps.extract.outputs.provider }}
        run: |
          chmod +x gradlew
          ./gradlew installDist --no-daemon

      - name: Create distribution zip
        working-directory: ${{ steps.extract.outputs.provider }}
        run: |
          echo "Contents of build/install:"
          ls -la build/install/
          INSTALL_DIR=$(find build/install -mindepth 1 -maxdepth 1 -type d | head -1)
          echo "Using install dir: $INSTALL_DIR"
          cd "$INSTALL_DIR"
          ls -la
          zip -r $GITHUB_WORKSPACE/${{ steps.extract.outputs.provider }}.zip .

      - name: Commit regenerated docs to main
        env:
          PROVIDER: ${{ steps.extract.outputs.provider }}
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          set -euo pipefail
          # We're on a detached HEAD at the tag commit. Stash the freshly
          # generated docs, switch to main, restore, commit as a follow-up.
          # The tag stays where it was placed by the user.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p "$RUNNER_TEMP/fresh-docs"
          if [ -d "$PROVIDER/docs" ]; then
            cp -r "$PROVIDER/docs" "$RUNNER_TEMP/fresh-docs/"
          fi

          git fetch origin main
          git checkout -B main origin/main

          # Restore freshly built docs over main's state
          rm -rf "$PROVIDER/docs"
          if [ -d "$RUNNER_TEMP/fresh-docs/docs" ]; then
            cp -r "$RUNNER_TEMP/fresh-docs/docs" "$PROVIDER/docs"
          fi

          git add "$PROVIDER/docs/"
          if git diff --cached --quiet; then
            echo "No doc changes to commit for $PROVIDER"
          else
            git commit -m "docs($PROVIDER): regenerate for v$VERSION [skip ci]"
            # Stash any leftover build artifacts so rebase has a clean tree
            git stash push --include-untracked --message "build-leftovers" || true
            for attempt in 1 2 3 4 5 6 7 8; do
              git pull --rebase origin main
              if git push origin main; then
                break
              fi
              echo "Push rejected on attempt $attempt, retrying..."
              sleep $((attempt * 2))
              if [ $attempt -eq 8 ]; then
                echo "::error::Push failed after 8 attempts"
                exit 1
              fi
            done
            git stash drop 2>/dev/null || true
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.extract.outputs.provider }} ${{ steps.extract.outputs.version }}
          tag_name: ${{ steps.extract.outputs.tag }}
          files: ${{ steps.extract.outputs.provider }}.zip
          generate_release_notes: true
          draft: false

      - name: Regenerate docs/providers.json index
        run: |
          set -euo pipefail
          ENTRIES=""
          for DIR in */; do
            PROVIDER="${DIR%/}"
            VERSIONS="$PROVIDER/docs/versions.json"
            [ -f "$VERSIONS" ] || continue
            LATEST=$(jq -r '.latest' "$VERSIONS")
            [ -n "$LATEST" ] && [ "$LATEST" != "null" ] || continue
            MANIFEST="$PROVIDER/docs/$LATEST/manifest.json"
            if [ -f "$MANIFEST" ]; then
              COUNT=$(jq '.resources | length' "$MANIFEST")
            else
              COUNT=0
            fi
            [ -n "$ENTRIES" ] && ENTRIES="$ENTRIES,"
            ENTRIES="$ENTRIES{\"name\":\"$PROVIDER\",\"latestVersion\":\"$LATEST\",\"resourceCount\":$COUNT}"
          done

          mkdir -p docs
          echo "{\"providers\":[$ENTRIES]}" | jq . > docs/providers.json

          git add docs/providers.json
          if git diff --cached --quiet; then
            echo "providers.json unchanged"
          else
            git commit -m "docs: regenerate providers.json index [skip ci]"
            for attempt in 1 2 3 4 5 6 7 8; do
              git pull --rebase origin main
              if git push origin main; then
                break
              fi
              echo "Push rejected on attempt $attempt, retrying..."
              sleep $((attempt * 2))
              if [ $attempt -eq 8 ]; then
                echo "::error::Push failed after 8 attempts"
                exit 1
              fi
            done
          fi
